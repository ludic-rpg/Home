    .sub-percent { font-size: 34px; font-weight: 950; text-anchor: middle; dominant-baseline: central; opacity: 1; }
    .footer-text { fill: #effff4; font-size: 46px; font-weight: 850; text-anchor: end; dominant-baseline: central; }
