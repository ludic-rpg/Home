<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 5000" role="img" aria-labelledby="title desc">
  <title id="title">The Alien Motion Tracker App</title>
  <desc id="desc">A tall mobile-friendly stacked bar showing 41,968 runtime lines split into tracker screen work, remote control, physical motion, and other app systems.</desc>
  
  <defs>
    <radialGradient id="bgGlow" cx="48%" cy="35%" r="78%">
      <stop offset="0%" stop-color="#14352f"/>
      <stop offset="58%" stop-color="#071713"/>
      <stop offset="100%" stop-color="#020504"/>
    </radialGradient>
    <pattern id="scanlines" width="7" height="7" patternUnits="userSpaceOnUse">
      <path d="M 0 0 H 7" stroke="#d8ffe0" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      :root { color-scheme: dark; }
      .bg { fill: url(#bgGlow); }
      .scan { fill: url(#scanlines); opacity: 0.55; }
      .title, .label, .small, .legend-title, .legend-lines, .legend-detail, .center-number, .center-label, .pct, .donut-pct, .stack-pct {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }
      .title { fill: #effff4; font-size: 54px; font-weight: 860; }
      .subtitle { fill: #b6d8c2; font-size: 28px; font-weight: 650; }
      .small { fill: #94bba4; font-size: 19px; font-weight: 620; }
      .legend-title { fill: #effff4; font-size: 40px; font-weight: 850; }
      .legend-lines { fill: #b8d9c3; font-size: 28px; font-weight: 700; }
      .legend-detail { fill: #b8d9c3; font-size: 28px; font-weight: 640; }
      .center-number { fill: #effff4; font-size: 62px; font-weight: 900; text-anchor: middle; }
      .center-label { fill: #b8d9c3; font-size: 30px; font-weight: 720; text-anchor: middle; }
      .pct { fill: #06110e; font-size: 22px; font-weight: 900; text-anchor: middle; dominant-baseline: central; }
      .donut-pct { font-size: 34px; font-weight: 940; text-anchor: middle; dominant-baseline: central; }
      .stack-pct { fill: #effff4; font-size: 22px; font-weight: 900; text-anchor: middle; dominant-baseline: central; }
      .arm { fill: none; stroke-width: 4; stroke-linecap: square; stroke-linejoin: miter; opacity: 0.95; }
      .hairline { stroke: #eaffef; stroke-opacity: 0.12; stroke-width: 1; }
      .panel-line { stroke: #d8ffe0; stroke-opacity: 0.16; stroke-width: 1.2; }
    </style>
  </defs>
  <rect class="bg" width="1280" height="5000"/>
  <rect class="scan" width="1280" height="5000"/>
  <style>
    .title { font-size: 70px; }
    .subtitle { font-size: 48px; }
    .small { font-size: 26px; }
    .rail-section, .sub-lines, .sub-label, .sub-percent, .footer-text {
