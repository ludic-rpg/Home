    <circle cx="610.0" cy="655.4" r="48" fill="#2c2105" stroke="#c58b1a" stroke-width="6" filter="url(#softGlow)"/>
    <text class="donut-pct" x="610.0" y="655.4" fill="#fff1c4">7%</text>
    <circle cx="420.9" cy="694.9" r="12" fill="#c58b1a"/>
    <text class="legend-title" x="386.9" y="701.9287699020679" text-anchor="end">Tooling</text><text class="legend-detail" x="386.9" y="740.9287699020679" text-anchor="end">4 899 lines for</text><text class="legend-detail" x="386.9" y="779.9287699020679" text-anchor="end">tools, debug, config</text>
  <text class="small" x="70" y="1270">Tracked source/control files only. Generated files, binary assets, imported Godot metadata, and compiled plugins are excluded.</text>
</svg>