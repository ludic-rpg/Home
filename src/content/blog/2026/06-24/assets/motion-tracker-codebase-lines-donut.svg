    <path d="M 567.447 734.244 A 315 315 0 0 1 535.192 605.993 L 670.110 601.282 A 180 180 0 0 0 688.541 674.568 Z" fill="#ffdc7a" opacity="0.96"/>
    <path d="M 567.447 734.244 A 315 315 0 0 1 535.192 605.993 L 670.110 601.282 A 180 180 0 0 0 688.541 674.568 Z" fill="none" stroke="#06110e" stroke-width="3" opacity="0.75"/>
  </g>
  <circle cx="850" cy="595" r="164" fill="#06110e" opacity="0.86"/>
  <text class="center-number" x="850" y="587">72 774</text>
  <text class="center-label" x="850" y="630">lines of code</text>
  
    <path class="arm" d="M 900.6 352.7 L 940.5 153.9" stroke="#00a9bd"/>
    
