<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" role="img" aria-labelledby="title desc">
  <title id="title">LAN and WAN schema for the Alien RPG motion tracker</title>
  <desc id="desc">A WiFi router bridges the Wide Area Network with the Local Area Network. The internet is on the WAN side. The GM phone and player phone connect separately to the router on the LAN side.</desc>

  <defs>
    <linearGradient id="greyGmLinkGradient" x1="240" y1="368" x2="410" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cfcfcf" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#cfcfcf" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="greyPlayerLinkGradient" x1="660" y1="368" x2="490" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cfcfcf" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#cfcfcf" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="gmLinkGradient" x1="240" y1="368" x2="410" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00ff66" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#00ff66" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="playerLinkGradient" x1="660" y1="368" x2="490" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00b7ff" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#00b7ff" stop-opacity="0.14"/>
    </linearGradient>
    <style>
      .label { fill: #d8d8d8; font-family: "Arial Rounded MT Bold", "Avenir Next Rounded", "Nunito", "Trebuchet MS", Arial, sans-serif; font-size: 22px; font-weight: 700; }
      .label-initial { fill: #ffffff; font-family: "Arial Rounded MT Bold", "Avenir Next Rounded", "Nunito", "Trebuchet MS", Arial, sans-serif; font-size: 22px; font-weight: 800; }
      .label-rest { fill: #a8a8a8; font-family: "Arial Rounded MT Bold", "Avenir Next Rounded", "Nunito", "Trebuchet MS", Arial, sans-serif; font-size: 22px; font-weight: 700; }
      .text { fill: #ffffff; font-family: "Arial Rounded MT Bold", "Avenir Next Rounded", "Nunito", "Trebuchet MS", Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .subtext { fill: #b7b7b7; font-family: "Arial Rounded MT Bold", "Avenir Next Rounded", "Nunito", "Trebuchet MS", Arial, sans-serif; font-size: 16px; }
      .line { stroke: #d8d8d8; stroke-width: 3; fill: none; }
      .frame { fill: none; stroke: #777; stroke-width: 2; stroke-dasharray: 10 10; }
      .badge { fill: #151515; stroke: #777; stroke-width: 2; }
      .badge-icon { fill: none; stroke: #f0f0f0; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .wifi-icon { fill: none; stroke-width: 3; stroke-linecap: round; }
      .phone-shell { fill: #151515; stroke-width: 2; animation-duration: 8.5s; animation-fill-mode: forwards; }
      .gm-shell { stroke: transparent; animation-name: gmShell; }
      .player-shell { stroke: transparent; animation-name: playerShell; }
      .gm-wifi, .gm-wifi-dot, .player-wifi, .player-wifi-dot, .gm-app, .player-app { animation-duration: 8.5s; animation-fill-mode: forwards; }
      .gm-wifi { opacity: 0; stroke: #858585; animation-name: gmWifi; }
      .gm-wifi-dot { opacity: 0; fill: #858585; animation-name: gmWifiDot; }
      .player-wifi { opacity: 0; stroke: #858585; animation-name: playerWifi; }
      .player-wifi-dot { opacity: 0; fill: #858585; animation-name: playerWifiDot; }
      .gm-app { opacity: 0; animation-name: gmApp; }
      .player-app { opacity: 0; animation-name: playerApp; }
      .led-gm, .led-player, .led-internet { animation-duration: 8.5s; animation-fill-mode: forwards; }
      .led-gm { fill: #777; animation-name: gmLed; }
      .led-player { fill: #777; animation-name: playerLed; }
      .led-internet { fill: #f7f7f7; animation-name: internetLed; }
      .uplink { opacity: 0; stroke-width: 2.5; stroke-dasharray: 1 11; stroke-linecap: round; fill: none; animation-duration: 8.5s; animation-fill-mode: forwards; }
      .grey-gm-link { stroke: url(#greyGmLinkGradient); animation-name: greyGmLink; }
      .grey-player-link { stroke: url(#greyPlayerLinkGradient); animation-name: greyPlayerLink; }
      .green-gm-link { stroke: url(#gmLinkGradient); animation-name: greenGmLink; }
      .blue-player-link { stroke: url(#playerLinkGradient); animation-name: bluePlayerLink; }

      @keyframes internetLed {
        0%, 7%, 14%, 21%, 28% { opacity: 1; }
        3.5%, 10.5%, 17.5%, 24.5% { opacity: 0.32; }
        35%, 100% { opacity: 1; }
      }

      @keyframes gmLed {
        0%, 14% { fill: #777; opacity: 0.65; }
        18%, 26%, 34% { fill: #b8b8b8; opacity: 1; }
        22%, 30% { fill: #777; opacity: 0.55; }
        40%, 100% { fill: #00ff66; opacity: 1; }
      }

      @keyframes playerLed {
        0%, 14% { fill: #777; opacity: 0.65; }
        18%, 26%, 34%, 42% { fill: #b8b8b8; opacity: 1; }
        22%, 30%, 38% { fill: #777; opacity: 0.55; }
        50%, 100% { fill: #00b7ff; opacity: 1; }
      }

      @keyframes gmWifi {
        0%, 12% { opacity: 0; stroke: #858585; }
        16%, 24%, 32% { opacity: 1; stroke: #b8b8b8; }
        20%, 28% { opacity: 0.38; stroke: #858585; }
        40%, 100% { opacity: 1; stroke: #00ff66; }
      }

      @keyframes gmWifiDot {
        0%, 12% { opacity: 0; fill: #858585; }
        16%, 24%, 32% { opacity: 1; fill: #b8b8b8; }
        20%, 28% { opacity: 0.38; fill: #858585; }
        40%, 100% { opacity: 1; fill: #00ff66; }
      }

      @keyframes playerWifi {
        0%, 12% { opacity: 0; stroke: #858585; }
        16%, 24%, 32%, 40% { opacity: 1; stroke: #b8b8b8; }
        20%, 28%, 36% { opacity: 0.38; stroke: #858585; }
        50%, 100% { opacity: 1; stroke: #00b7ff; }
      }

      @keyframes playerWifiDot {
        0%, 12% { opacity: 0; fill: #858585; }
        16%, 24%, 32%, 40% { opacity: 1; fill: #b8b8b8; }
        20%, 28%, 36% { opacity: 0.38; fill: #858585; }
        50%, 100% { opacity: 1; fill: #00b7ff; }
      }

      @keyframes greyGmLink {
        0%, 13% { opacity: 0; stroke-dashoffset: 44; }
        17%, 34% { opacity: 1; stroke-dashoffset: 0; }
        39%, 100% { opacity: 0; stroke-dashoffset: -32; }
      }

      @keyframes greyPlayerLink {
        0%, 13% { opacity: 0; stroke-dashoffset: 44; }
        17%, 43% { opacity: 1; stroke-dashoffset: 0; }
        49%, 100% { opacity: 0; stroke-dashoffset: -32; }
      }

      @keyframes greenGmLink {
        0%, 36% { opacity: 0; stroke-dashoffset: 44; }
        40%, 47% { opacity: 1; stroke-dashoffset: 0; }
        54%, 100% { opacity: 0; stroke-dashoffset: -28; }
      }

      @keyframes bluePlayerLink {
        0%, 47% { opacity: 0; stroke-dashoffset: 44; }
        51%, 58% { opacity: 1; stroke-dashoffset: 0; }
        64%, 100% { opacity: 0; stroke-dashoffset: -28; }
      }

      @keyframes gmShell {
        0%, 59% { stroke: transparent; }
        69%, 100% { stroke: #00ff66; }
      }

      @keyframes playerShell {
        0%, 69% { stroke: transparent; }
        79%, 100% { stroke: #00b7ff; }
      }

      @keyframes gmApp {
        0%, 63% { opacity: 0; }
        72%, 100% { opacity: 1; }
      }

      @keyframes playerApp {
        0%, 73% { opacity: 0; }
        82%, 100% { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
      }
    </style>
  </defs>

  <rect width="900" height="640" fill="#0d0d0d"/>

  <rect x="60" y="66" width="780" height="196" rx="8" class="frame"/>
  <rect x="315" y="45" width="270" height="34" fill="#0d0d0d"/>
  <text x="450" y="69" text-anchor="middle">
    <tspan class="label-initial">W</tspan><tspan class="label-rest">ide </tspan>
    <tspan class="label-initial">A</tspan><tspan class="label-rest">rea </tspan>
    <tspan class="label-initial">N</tspan><tspan class="label-rest">etwork</tspan>
  </text>
  <g transform="translate(60 153)">
    <circle r="24" class="badge"/>
    <circle r="12" class="badge-icon"/>
    <path d="M-12 0 H12 M0 -12 C-4 -7 -6 -3 -6 0 C-6 3 -4 7 0 12 M0 -12 C4 -7 6 -3 6 0 C6 3 4 7 0 12" class="badge-icon"/>
  </g>

  <rect x="60" y="272" width="780" height="308" rx="8" class="frame"/>
  <rect x="310" y="558" width="280" height="34" fill="#0d0d0d"/>
  <text x="450" y="582" text-anchor="middle">
    <tspan class="label-initial">L</tspan><tspan class="label-rest">ocal </tspan>
    <tspan class="label-initial">A</tspan><tspan class="label-rest">rea </tspan>
    <tspan class="label-initial">N</tspan><tspan class="label-rest">etwork</tspan>
  </text>
  <g transform="translate(60 420)">
    <circle r="24" class="badge"/>
    <path d="M-13 0 L0 -12 L13 0" class="badge-icon"/>
    <path d="M-9 0 V12 H9 V0" class="badge-icon"/>
  </g>

  <text x="450" y="142" class="text" text-anchor="middle">Internet</text>
  <path class="line" d="M450 158 V234"/>

  <!-- Router -->
  <g transform="translate(375 210)">
    <rect x="0" y="24" width="150" height="66" rx="12" fill="#151515" stroke="#f0f0f0" stroke-width="2"/>
    <circle cx="36" cy="55" r="4" class="led-gm"/>
    <circle cx="58" cy="55" r="4" class="led-player"/>
    <circle cx="80" cy="55" r="4" class="led-internet"/>
    <line x1="100" y1="55" x2="128" y2="55" stroke="#777" stroke-width="2"/>
    <text x="75" y="80" class="subtext" text-anchor="middle">WiFi router</text>
  </g>

  <!-- Dotted WiFi links -->
  <path d="M410 300 C350 332 272 346 240 368" class="uplink grey-gm-link"/>
  <path d="M490 300 C550 332 628 346 660 368" class="uplink grey-player-link"/>
  <path d="M410 300 C350 332 272 346 240 368" class="uplink green-gm-link"/>
  <path d="M490 300 C550 332 628 346 660 368" class="uplink blue-player-link"/>

  <!-- GM phone -->
  <g transform="translate(200 342)">
    <rect x="0" y="0" width="80" height="156" rx="12" class="phone-shell gm-shell"/>
    <rect x="8" y="16" width="64" height="118" rx="5" fill="none" stroke="#505050" stroke-width="1.5"/>
    <path d="M28 10 H52" stroke="#505050" stroke-width="3" stroke-linecap="round"/>
    <circle cx="40" cy="145" r="5" fill="#505050"/>
    <g class="wifi-icon gm-wifi">
      <path d="M26 57 Q40 45 54 57"/>
      <path d="M31 64 Q40 57 49 64"/>
      <path d="M36 71 Q40 68 44 71"/>
    </g>
    <circle cx="40" cy="78" r="3" class="gm-wifi-dot"/>
    <text x="40" y="96" class="subtext gm-app" text-anchor="middle">Admin</text>
    <text x="40" y="116" class="subtext gm-app" text-anchor="middle">App</text>
    <text x="40" y="188" class="text" text-anchor="middle">GM</text>
  </g>

  <!-- Player phone -->
  <g transform="translate(620 342)">
    <rect x="0" y="0" width="80" height="156" rx="12" class="phone-shell player-shell"/>
    <rect x="8" y="16" width="64" height="118" rx="5" fill="none" stroke="#505050" stroke-width="1.5"/>
    <path d="M28 10 H52" stroke="#505050" stroke-width="3" stroke-linecap="round"/>
    <circle cx="40" cy="145" r="5" fill="#505050"/>
    <g class="wifi-icon player-wifi">
      <path d="M26 57 Q40 45 54 57"/>
      <path d="M31 64 Q40 57 49 64"/>
      <path d="M36 71 Q40 68 44 71"/>
    </g>
    <circle cx="40" cy="78" r="3" class="player-wifi-dot"/>
    <text x="40" y="96" class="subtext player-app" text-anchor="middle">Tracker</text>
    <text x="40" y="116" class="subtext player-app" text-anchor="middle">App</text>
    <text x="40" y="188" class="text" text-anchor="middle">Player</text>
  </g>
</svg>
